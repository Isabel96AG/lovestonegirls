version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_2024
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app

  api:
    build: ./api_ecommerce
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./api_ecommerce/storage:/var/www/storage
    networks:
      - app

  ecommerce:
    build: ./ecommerce
    restart: unless-stopped
    networks:
      - app

  admin:
    build: ./admin_metronic_8.2
    restart: unless-stopped
    networks:
      - app

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ecommerce
      - admin
    networks:
      - app

volumes:
  db_data:

networks:
  app:
