<main>

  <!-- breadcrumb area start -->
  <section class="breadcrumb__area include-bg text-center pt-95 pb-50">
    <div class="container">
      <div class="row">
        <div class="col-xxl-12">
          <div class="breadcrumb__content p-relative z-index-1">
            <h3 class="breadcrumb__title">Crear cuenta</h3>
            <div class="breadcrumb__list">
              <span><a [routerLink]="['/']">Inicio</a></span>
              <span>Registro</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- breadcrumb area end -->

  <!-- login area start -->
  <section class="tp-login-area pb-140 p-relative z-index-1 fix">
    <div class="tp-login-shape">
      <img class="tp-login-shape-1" src="assets/img/login/login-shape-1.png" alt="">
      <img class="tp-login-shape-2" src="assets/img/login/login-shape-2.png" alt="">
      <img class="tp-login-shape-3" src="assets/img/login/login-shape-3.png" alt="">
      <img class="tp-login-shape-4" src="assets/img/login/login-shape-4.png" alt="">
    </div>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-8">
          <div class="tp-login-wrapper">

            <div class="tp-login-top text-center mb-30">
              <h3 class="tp-login-title">&#218;nete a LovestonedGirls.</h3>
              <p>&#191;Ya tienes cuenta? <span><a [routerLink]="['/login']">Inicia sesi&#243;n</a></span></p>
            </div>

            <div class="tp-login-option">

              <!-- Registro con redes sociales (Google / Facebook / Apple) — desactivado
              <div class="tp-login-social mb-10 d-flex flex-wrap align-items-center justify-content-center">
                <div class="tp-login-option-item has-google">
                  <a href="#">
                    <img src="assets/img/icon/login/google.svg" alt="">
                    Sign up with google
                  </a>
                </div>
                <div class="tp-login-option-item">
                  <a href="#">
                    <img src="assets/img/icon/login/facebook.svg" alt="">
                  </a>
                </div>
                <div class="tp-login-option-item">
                  <a href="#">
                    <img class="apple" src="assets/img/icon/login/apple.svg" alt="">
                  </a>
                </div>
              </div>
              <div class="tp-login-mail text-center mb-40">
                <p>or Sign up with <a href="#">Email</a></p>
              </div>
              -->

              <div class="tp-login-input-wrapper">

                <div class="tp-login-input-box">
                  <div class="tp-login-input" [class.is-invalid]="errores.name">
                    <input id="name" type="text" placeholder="Nombre" [(ngModel)]="name" name="name">
                  </div>
                  <div class="tp-login-input-title">
                    <label for="name">Tu nombre</label>
                  </div>
                  <!-- error si el nombre no cumple los requisitos -->
                  <small *ngIf="errores.name" style="color: #dc3545; font-size: 12px;">{{ errores.name }}</small>
                </div>

                <div class="tp-login-input-box">
                  <div class="tp-login-input" [class.is-invalid]="errores.surname">
                    <input id="surname" type="text" placeholder="Apellido" [(ngModel)]="surname" name="surname">
                  </div>
                  <div class="tp-login-input-title">
                    <label for="surname">Tu apellido</label>
                  </div>
                  <!-- error si el apellido no cumple los requisitos -->
                  <small *ngIf="errores.surname" style="color: #dc3545; font-size: 12px;">{{ errores.surname }}</small>
                </div>

                <div class="tp-login-input-box">
                  <div class="tp-login-input" [class.is-invalid]="errores.email">
                    <input id="email" type="email" placeholder="tu@email.com" [(ngModel)]="email" name="email">
                  </div>
                  <div class="tp-login-input-title">
                    <label for="email">Tu email</label>
                  </div>
                  <!-- error si el email no tiene formato válido -->
                  <small *ngIf="errores.email" style="color: #dc3545; font-size: 12px;">{{ errores.email }}</small>
                </div>

                <div class="tp-login-input-box">
                  <div class="tp-login-input" [class.is-invalid]="errores.phone">
                    <input id="phone" type="text" placeholder="600123456" [(ngModel)]="phone" name="phone">
                  </div>
                  <div class="tp-login-input-title">
                    <label for="phone">Tu teléfono</label>
                  </div>
                  <!-- error si el teléfono no tiene 9 dígitos -->
                  <small *ngIf="errores.phone" style="color: #dc3545; font-size: 12px;">{{ errores.phone }}</small>
                </div>

                <div class="tp-login-input-box">
                  <div class="tp-login-input" [class.is-invalid]="errores.password">
                    <input id="tp_password" type="password" placeholder="Min. 8 character" [(ngModel)]="password" name="password">
                  </div>
                  <div class="tp-login-input-title">
                    <label for="tp_password">Contraseña</label>
                  </div>
                  <!-- error si la contraseña es demasiado corta -->
                  <small *ngIf="errores.password" style="color: #dc3545; font-size: 12px;">{{ errores.password }}</small>
                </div>

              </div>

              <div class="tp-login-suggetions d-sm-flex align-items-center justify-content-between mb-20">
                <div class="tp-login-remeber">
                  <input id="remeber" type="checkbox">
                  <label for="remeber">Acepto los t&#233;rminos del servicio y la <a href="#">Pol&#237;tica de privacidad</a>.</label>
                </div>
              </div>

              <div class="tp-login-bottom">
                <button type="button" class="tp-login-btn w-100" (click)="register()">Crear cuenta</button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- login area end -->

</main>
