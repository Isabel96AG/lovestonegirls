<main>

  <!-- breadcrumb area start -->
  <section class="breadcrumb__area include-bg text-center pt-95 pb-50">
    <div class="container">
      <div class="row">
        <div class="col-xxl-12">
          <div class="breadcrumb__content p-relative z-index-1">
            <h3 class="breadcrumb__title">My account</h3>
            <div class="breadcrumb__list">
              <span><a [routerLink]="['/']">Home</a></span>
              <span>My account</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- breadcrumb area end -->

  <!-- login area start -->
  <section class="tp-login-area pb-140 p-relative z-index-1 fix">
    <div class="tp-login-shape">
      <img class="tp-login-shape-1" src="assets/img/login/login-shape-1.png" alt="">
      <img class="tp-login-shape-2" src="assets/img/login/login-shape-2.png" alt="">
      <img class="tp-login-shape-3" src="assets/img/login/login-shape-3.png" alt="">
      <img class="tp-login-shape-4" src="assets/img/login/login-shape-4.png" alt="">
    </div>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-8">
          <div class="tp-login-wrapper">

            <div class="tp-login-top text-center mb-30">
              <h3 class="tp-login-title">Login to Shofy.</h3>
              <p>Don’t have an account? <span><a [routerLink]="['/register']">Create a free account</a></span></p>
            </div>

            <div class="tp-login-option">

              <!-- Login con redes sociales (Google / Facebook / Apple) — desactivado
              <div class="tp-login-social mb-10 d-flex flex-wrap align-items-center justify-content-center">
                <div class="tp-login-option-item has-google">
                  <a href="#">
                    <img src="assets/img/icon/login/google.svg" alt="">
                    Sign in with google
                  </a>
                </div>
                <div class="tp-login-option-item">
                  <a href="#">
                    <img src="assets/img/icon/login/facebook.svg" alt="">
                  </a>
                </div>
                <div class="tp-login-option-item">
                  <a href="#">
                    <img class="apple" src="assets/img/icon/login/apple.svg" alt="">
                  </a>
                </div>
              </div>
              <div class="tp-login-mail text-center mb-40">
                <p>or Sign in with <a href="#">Email</a></p>
              </div>
              -->

              <div class="tp-login-input-wrapper">

                <div class="tp-login-input-box">
                  <div class="tp-login-input" [class.is-invalid]="errores.email">
                    <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="shofy@mail.com">
                  </div>
                  <div class="tp-login-input-title">
                    <label for="email">Your Email</label>
                  </div>
                  <!-- mensaje de error si el email no es válido -->
                  <small *ngIf="errores.email" style="color: #dc3545; font-size: 12px;">{{ errores.email }}</small>
                </div>

                <div class="tp-login-input-box">
                  <div class="tp-login-input" [class.is-invalid]="errores.password">
                    <input id="tp_password" type="password" [(ngModel)]="password" name="password" placeholder="Min. 8 character">
                  </div>
                  <div class="tp-login-input-title">
                    <label for="tp_password">Password</label>
                  </div>
                  <!-- mensaje de error si la contraseña está vacía -->
                  <small *ngIf="errores.password" style="color: #dc3545; font-size: 12px;">{{ errores.password }}</small>
                </div>

              </div>

              <div class="tp-login-suggetions d-sm-flex align-items-center justify-content-between mb-20">
                <div class="tp-login-remeber">
                  <input id="remeber" type="checkbox">
                  <label for="remeber">Remember me</label>
                </div>
              </div>

              <div class="tp-login-bottom">
                <button type="button" class="tp-login-btn w-100" (click)="login()">Login</button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- login area end -->

</main>
