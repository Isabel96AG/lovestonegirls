<div class="card">
  <span class="spinner-border spinner-border-sm align-middle ms-2" *ngIf="isLoading$ | async"></span>
  <div class="card-header border-0 pt-6">
    <div class="card-title d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between w-100 gap-3">
      <div class="d-flex align-items-center position-relative">
        <i class="ki-duotone ki-magnifier fs-3 position-absolute ms-4 text-gray-500">
          <span class="path1"></span><span class="path2"></span>
        </i>
        <input type="text" (keyup)="searchTo()" [(ngModel)]="search"
          class="form-control form-control-solid w-250px ps-12" placeholder="Buscar por cliente..." />
      </div>
    </div>
  </div>

  <div class="card-body py-4">
    <div class="table-responsive">
      <table class="table align-middle table-row-dashed fs-6 gy-5">
        <thead>
          <tr class="text-start text-muted fw-bold fs-7 text-uppercase">
            <th>Nº Pedido</th>
            <th>Cliente</th>
            <th>Total</th>
            <th>Pago</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody class="text-gray-600 fw-semibold">
          <tr *ngFor="let sale of sales">
            <td><span class="fw-bold">#{{ sale.id }}</span></td>
            <td>
              <div class="d-flex flex-column">
                <span class="fw-bold">{{ sale.user?.name }}</span>
                <span class="text-muted fs-7">{{ sale.user?.email }}</span>
              </div>
            </td>
            <td><span class="fw-bold">{{ sale.total }}€</span></td>
            <td><span class="text-capitalize">{{ sale.method_payment }}</span></td>
            <td>
              <span class="badge fs-7 fw-bold" [ngClass]="badgeClass(sale.state)">
                {{ sale.state }}
              </span>
            </td>
            <td><span class="text-muted">{{ sale.created_at }}</span></td>
            <td class="text-end">
              <a [routerLink]="['/sales/show', sale.id]"
                class="btn btn-icon btn-bg-light btn-active-color-primary btn-sm" title="Ver detalle">
                <i class="ki-duotone ki-eye fs-2">
                  <span class="path1"></span><span class="path2"></span><span class="path3"></span>
                </i>
              </a>
            </td>
          </tr>
          <tr *ngIf="sales.length === 0">
            <td colspan="7" class="text-center text-muted py-5">No hay pedidos aún</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-4">
      <ngb-pagination [collectionSize]="totalPages" [(page)]="currentPage" [pageSize]="15"
        [rotate]="true" [boundaryLinks]="true" (pageChange)="loadPage($event)" [maxSize]="3"
        class="d-flex justify-content-center flex-wrap">
      </ngb-pagination>
    </div>
  </div>
</div>
