<div class="card">
  <span class="spinner-border spinner-border-sm align-middle ms-2" *ngIf="isLoading$ | async"></span>
  <div class="card-header border-0 pt-6">
    <div class="card-title d-flex align-items-center justify-content-between w-100 gap-3">
      <div class="d-flex align-items-center position-relative">
        <i class="ki-duotone ki-magnifier fs-3 position-absolute ms-4 text-gray-500">
          <span class="path1"></span><span class="path2"></span>
        </i>
        <input type="text" (keyup)="searchTo()" [(ngModel)]="search"
          class="form-control form-control-solid w-250px ps-12" placeholder="Buscar email..." />
      </div>
      <div class="text-muted fs-6">
        Total: <strong>{{ totalPages }}</strong> suscriptores
      </div>
    </div>
  </div>

  <div class="card-body py-4">
    <div class="table-responsive">
      <table class="table align-middle table-row-dashed fs-6 gy-5">
        <thead>
          <tr class="text-start text-muted fw-bold fs-7 text-uppercase">
            <th>Email</th>
            <th>Fecha de suscripción</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody class="text-gray-600 fw-semibold">
          <tr *ngFor="let subscriber of subscribers">
            <td><span class="fw-bold">{{ subscriber.email }}</span></td>
            <td><span class="text-muted">{{ subscriber.created_at }}</span></td>
            <td class="text-end">
              <a href="#" onclick="return false" (click)="eliminar(subscriber)"
                class="btn btn-icon btn-bg-light btn-active-color-danger btn-sm" title="Eliminar">
                <i class="ki-duotone ki-trash fs-2">
                  <span class="path1"></span><span class="path2"></span>
                  <span class="path3"></span><span class="path4"></span><span class="path5"></span>
                </i>
              </a>
            </td>
          </tr>
          <tr *ngIf="subscribers.length === 0">
            <td colspan="3" class="text-center text-muted py-5">No hay suscriptores aún</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-4">
      <ngb-pagination [collectionSize]="totalPages" [(page)]="currentPage" [pageSize]="20"
        [rotate]="true" [boundaryLinks]="true" (pageChange)="loadPage($event)" [maxSize]="3"
        class="d-flex justify-content-center flex-wrap">
      </ngb-pagination>
    </div>
  </div>
</div>
