<div class="card">
    <div class="card-header border-0 pt-6">
        <h2 class="fw-bolder">Editar Slider</h2>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-8">
                <div class="fv-row mb-7">
                    <label class="required fw-bold fs-6 mb-2">Título</label>
                    <input type="text" class="form-control form-control-solid" placeholder="Título del slider"
                        [(ngModel)]="title" />
                </div>
                <div class="fv-row mb-7">
                    <label class="fw-bold fs-6 mb-2">Subtítulo</label>
                    <input type="text" class="form-control form-control-solid" placeholder="Subtítulo"
                        [(ngModel)]="subtitle" />
                </div>
                <div class="fv-row mb-7">
                    <label class="fw-bold fs-6 mb-2">Etiqueta (label)</label>
                    <input type="text" class="form-control form-control-solid" placeholder="Ej: Nueva colección"
                        [(ngModel)]="label" />
                </div>
                <div class="fv-row mb-7">
                    <label class="fw-bold fs-6 mb-2">Enlace</label>
                    <input type="text" class="form-control form-control-solid" placeholder="URL de destino"
                        [(ngModel)]="link" />
                </div>
                <div class="row mb-7">
                    <div class="col-md-6">
                        <label class="fw-bold fs-6 mb-2">Tipo</label>
                        <select class="form-control form-select-solid" [(ngModel)]="type_slider">
                            <option [value]="1">Principal</option>
                            <option [value]="2">Secundario</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold fs-6 mb-2">Estado</label>
                        <select class="form-control form-select-solid" [(ngModel)]="state">
                            <option [value]="1">Activo</option>
                            <option [value]="0">Inactivo</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <label class="fw-bold fs-6 mb-2">Imagen</label>
                <div class="text-center mb-4">
                    <img *ngIf="imagen_previsualiza" [src]="imagen_previsualiza" alt="preview"
                        style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;">
                    <div *ngIf="!imagen_previsualiza" class="bg-light d-flex align-items-center justify-content-center"
                        style="height:160px;border-radius:8px;">
                        <i class="ki-duotone ki-picture fs-3x text-muted">
                            <span class="path1"></span>
                            <span class="path2"></span>
                        </i>
                    </div>
                </div>
                <input type="file" accept="image/*" class="form-control form-control-solid"
                    (change)="procesarImagen($event)">
            </div>
        </div>

        <div class="text-end pt-6">
            <a routerLink="/sliders/list" class="btn btn-light me-3">Cancelar</a>
            <button type="button" (click)="save()" class="btn btn-primary">
                Guardar cambios
                <span class="spinner-border spinner-border-sm align-middle ms-2" *ngIf="isLoading$ | async"></span>
            </button>
        </div>
    </div>
</div>
